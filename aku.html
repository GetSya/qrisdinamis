<head>
    <meta charset="UTF-8" />

    <meta name="keywords" content="QRIS, Generator QRIS, Pembayaran Digital, Fintech, QRIS Dinamis, Jojo Store" />
    <meta name="theme-color" content="#0F172A" />

    <meta property="og:description" content="Buat kode QRIS untuk pembayaran dengan mudah dan cepat." />
    <meta property="og:type" content="website" />

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233B82F6'><path d='M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm-3 0h2v2h-2v-2zm3 3h3v2h-3v-2zm-2 3h2v2h-2v-2zm-3-3h2v2h-2v-2zm0 3h2v2h-2v-2zm-2-3h2v2h-2v-2zm0-3h2v2h-2v-2z'/></svg>" />

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        /* ============================================
                   CSS VARIABLES
                   ============================================ */
        :root {
            --bg-primary: #0F172A;
            --bg-secondary: #1E293B;
            --bg-card: rgba(30, 41, 59, 0.75);
            --bg-input: #0F172A;
            --bg-input-light: #F1F5F9;

            --primary: #3B82F6;
            --primary-hover: #2563EB;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --primary-gradient: linear-gradient(135deg, #3B82F6, #8B5CF6);

            --success: #22C55E;
            --success-hover: #16A34A;
            --success-glow: rgba(34, 197, 94, 0.35);

            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;

            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(59, 130, 246, 0.5);

            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);

            --radius: 24px;
            --radius-sm: 14px;
            --radius-full: 9999px;

            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);

            --font: 'Poppins', sans-serif;

            --blur-amount: 20px;
        }

        /* Light Theme */
        [data-theme="light"] {
            --bg-primary: #F1F5F9;
            --bg-secondary: #FFFFFF;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-input: #F1F5F9;

            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;

            --border-color: rgba(0, 0, 0, 0.06);

            --shadow-card: 0 20px 60px rgba(0, 0, 0, 0.08);
            --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.08);
        }

        /* ============================================
                   RESET & BASE
                   ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background var(--transition), color var(--transition);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.12) 0%, transparent 70%);
            z-index: 0;
            animation: floatBlob 20s ease-in-out infinite alternate;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.10) 0%, transparent 70%);
            z-index: 0;
            animation: floatBlob 25s ease-in-out infinite alternate-reverse;
            pointer-events: none;
        }

        @keyframes floatBlob {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
            100% {
                transform: translate(10px, -10px) scale(1.05);
            }
        }

        /* ============================================
                   TOP NAV — THEME TOGGLE
                   ============================================ */
        .top-nav {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
        }

        .theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .theme-toggle:hover {
            transform: scale(1.08) rotate(8deg);
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .theme-toggle i {
            transition: transform var(--transition);
        }

        .theme-toggle:hover i {
            transform: rotate(20deg);
        }

        /* ============================================
                   TOAST CONTAINER
                   ============================================ */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: none;
            width: 100%;
            max-width: 420px;
            padding: 0 16px;
        }

        .toast {
            pointer-events: auto;
            background: var(--bg-card);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px 24px;
            border-radius: var(--radius-full);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-20px) scale(0.96);
            animation: toastEnter 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            width: 100%;
        }

        .toast.error i {
            color: #EF4444;
        }
        .toast.success i {
            color: var(--success);
        }

        .toast.fade-out {
            animation: toastLeave 0.3s ease forwards;
        }

        @keyframes toastEnter {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastLeave {
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.96);
            }
        }

        /* ============================================
                   MAIN WRAPPER (Card + History)
                   ============================================ */
        .app-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 28px;
            width: 100%;
            max-width: 1000px;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }

        /* ============================================
                   MAIN CARD
                   ============================================ */
        .card-container {
            flex: 1 1 440px;
            max-width: 480px;
            padding: 32px 28px;
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-card), var(--shadow-glow);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border-color);
            transition: all var(--transition-slow);
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ============================================
                   HISTORY PANEL
                   ============================================ */
        .history-panel {
            flex: 0 0 320px;
            max-width: 360px;
            min-width: 260px;
            background: var(--bg-card);
            border-radius: var(--radius);
            backdrop-filter: blur(var(--blur-amount));
            -webkit-backdrop-filter: blur(var(--blur-amount));
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            padding: 24px 20px;
            transition: all var(--transition-slow);
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
            max-height: 580px;
            display: flex;
            flex-direction: column;
        }

        .history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .history-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-header h3 i {
            color: var(--primary);
            font-size: 1rem;
        }

        .history-header .clear-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--radius-full);
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-header .clear-btn:hover {
            color: #EF4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .history-list::-webkit-scrollbar {
            width: 4px;
        }

        .history-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            transition: all var(--transition);
            cursor: default;
        }

        .history-item:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
        }

        .history-item .info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .history-item .info .nominal {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .history-item .info .time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .history-item .actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .history-item .actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            transition: all var(--transition);
            font-size: 0.8rem;
        }

        .history-item .actions button:hover {
            color: var(--text-primary);
            background: var(--border-color);
        }

        .history-item .actions button.delete:hover {
            color: #EF4444;
            background: rgba(239, 68, 68, 0.15);
        }

        .history-empty {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            padding: 30px 0;
        }

        .history-empty i {
            font-size: 2rem;
            margin-bottom: 8px;
            opacity: 0.5;
        }

        /* ============================================
                   VIEW SECTIONS (inside card)
                   ============================================ */
        .view-section {
            display: none;
            animation: fadeInUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .view-section.active {
            display: block;
        }

        /* ============================================
                   HEADER (inside card)
                   ============================================ */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: var(--primary-gradient);
            box-shadow: 0 8px 32px var(--primary-glow);
            margin-bottom: 16px;
            transition: transform var(--transition);
        }

        .logo-icon:hover {
            transform: scale(1.05) rotate(-2deg);
        }

        .logo-icon svg {
            width: 40px;
            height: 40px;
            fill: white;
        }

        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 6px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ============================================
                   FORM
                   ============================================ */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 1.1rem;
            pointer-events: none;
            transition: color var(--transition);
        }

        .input-group input {
            width: 100%;
            padding: 18px 18px 18px 52px;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            font-family: var(--font);
            outline: none;
            transition: all var(--transition);
            letter-spacing: 0.3px;
        }

        .input-group input::placeholder {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 0.95rem;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-glow);
            background: var(--bg-input);
        }

        .input-group input:focus~.input-icon,
        .input-group input:focus+.input-icon {
            color: var(--primary);
        }

        .input-group input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ============================================
                   BUTTONS
                   ============================================ */
        .btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all var(--transition);
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background var(--transition);
            border-radius: inherit;
        }

        .btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 24px var(--primary-glow);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 40px var(--primary-glow);
        }

        .btn-primary:active:not(:disabled) {
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success), #059669);
            box-shadow: 0 4px 24px var(--success-glow);
        }

        .btn-success:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 40px var(--success-glow);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-primary);
        }

        .btn-outline:hover {
            background: var(--bg-input);
            border-color: var(--text-secondary);
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================
                   RESULT VIEW (inside card)
                   ============================================ */
        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .result-header .check-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success), #059669);
            color: #fff;
            font-size: 2rem;
            margin-bottom: 12px;
            box-shadow: 0 8px 32px var(--success-glow);
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .result-header h2 {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .result-header .sub {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .nominal-box {
            background: var(--bg-input);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            text-align: center;
            margin-bottom: 20px;
            border: 2px dashed var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .nominal-box:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.05);
            transform: scale(1.01);
        }

        .nominal-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .nominal-box .copy-icon {
            color: var(--text-muted);
            font-size: 1rem;
            transition: color var(--transition);
        }

        .nominal-box:hover .copy-icon {
            color: var(--primary);
        }

        .qr-wrapper {
            background: #ffffff;
            padding: 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            position: relative;
            min-height: 200px;
            transition: all var(--transition);
        }

        .qr-wrapper img {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 8px;
            display: none;
        }

        .qr-wrapper img.show {
            display: block;
            animation: zoomIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .qr-wrapper .qr-spinner {
            color: var(--primary);
            font-size: 2.5rem;
            animation: spin 0.8s linear infinite;
        }

        @keyframes zoomIn {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .action-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .action-grid .row {
            display: flex;
            gap: 10px;
        }

        .action-grid .row .btn {
            flex: 1;
        }

        .action-grid .row .btn:last-child {
            flex: 0.6;
        }

        /* ============================================
                   FOOTER
                   ============================================ */
        .footer {
            margin-top: 28px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3px;
            width: 100%;
        }

        .footer i {
            color: var(--primary);
            margin: 0 4px;
        }

        .footer .heart {
            color: #EF4444;
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* ============================================
                   RESPONSIVE
                   ============================================ */
        @media (max-width: 860px) {
            .app-wrapper {
                flex-direction: column;
                align-items: center;
            }

            .card-container {
                flex: 1 1 auto;
                width: 100%;
                max-width: 480px;
            }

            .history-panel {
                flex: 1 1 auto;
                width: 100%;
                max-width: 480px;
                min-width: 0;
                max-height: 350px;
            }
        }

        @media (max-width: 520px) {
            .card-container {
                padding: 24px 18px;
                border-radius: 20px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .logo-icon {
                width: 60px;
                height: 60px;
            }

            .logo-icon svg {
                width: 32px;
                height: 32px;
            }

            .input-group input {
                padding: 16px 16px 16px 46px;
                font-size: 1rem;
            }

            .input-group .input-icon {
                left: 14px;
                font-size: 1rem;
            }

            .btn {
                padding: 14px 18px;
                font-size: 0.9rem;
            }

            .nominal-box h2 {
                font-size: 1.2rem;
            }

            .qr-wrapper {
                padding: 12px;
                min-height: 160px;
            }

            .qr-wrapper img {
                max-width: 200px;
            }

            .action-grid .row {
                flex-direction: column;
            }

            .action-grid .row .btn:last-child {
                flex: 1;
            }

            .top-nav {
                top: 16px;
                right: 16px;
            }

            .theme-toggle {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }

            .toast-container {
                top: 16px;
                padding: 0 12px;
            }

            .toast {
                padding: 12px 18px;
                font-size: 0.85rem;
            }

            .history-panel {
                padding: 18px 14px;
                max-height: 300px;
            }
        }

        @media (max-width: 380px) {
            .card-container {
                padding: 18px 12px;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .header p {
                font-size: 0.8rem;
            }

            .input-group input {
                padding: 14px 14px 14px 40px;
                font-size: 0.9rem;
            }

            .btn {
                padding: 12px 14px;
                font-size: 0.85rem;
            }

            .history-panel {
                padding: 14px 10px;
            }
        }

        @media (min-width: 768px) {
            .card-container {
                padding: 40px 36px;
            }

            .header h1 {
                font-size: 1.8rem;
            }
        }

        @media (min-width: 1024px) {
            .card-container {
                padding: 44px 40px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== TOP NAV ===== -->
    <nav class="top-nav">
        <button class="theme-toggle" id="themeBtn" aria-label="Toggle Theme">
            <i class="fa-solid fa-sun"></i>
        </button>
    </nav>

    <!-- ===== TOAST CONTAINER ===== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ===== APP WRAPPER ===== -->
    <div class="app-wrapper">

        <!-- ===== MAIN CARD ===== -->
        <div class="card-container">

            <!-- ========== VIEW 1: FORM ========== -->
            <div id="viewForm" class="view-section active">
                <div class="header">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h3v2h-3v-2zm-3 0h2v2h-2v-2zm3 3h3v2h-3v-2zm-2 3h2v2h-2v-2zm-3-3h2v2h-2v-2zm0 3h2v2h-2v-2zm-2-3h2v2h-2v-2zm0-3h2v2h-2v-2z"/>
                        </svg>
                    </div>
                    <h1>Generator QRIS Dinamis</h1>
                    <p>Masukkan nominal pembayaran untuk membuat QRIS Dinamis.</p>
                </div>

                <div class="input-group">
                    <span class="input-icon">Rp</span>
                    <input type="text" id="inputNominal" inputmode="numeric" placeholder="Masukkan nominal pembayaran" autocomplete="off" />
                </div>

                <button class="btn btn-primary" id="btnGenerate">
                    <i class="fa-solid fa-qrcode"></i> Generate QRIS
                </button>
            </div>

            <!-- ========== VIEW 2: RESULT ========== -->
            <div id="viewResult" class="view-section">
                <div class="result-header">
                    <div class="check-icon">
                        <i class="fa-solid fa-check"></i>
                    </div>
                    <h2>QRIS Berhasil Dibuat</h2>
                    <span class="sub">Kode QR siap untuk pembayaran</span>
                </div>

                <!-- Nominal Box -->
                <div class="nominal-box" id="boxNominal" title="Klik untuk menyalin nominal">
                    <h2 id="displayNominal">Rp 0</h2>
                    <i class="fa-regular fa-copy copy-icon"></i>
                </div>

                <!-- QR Code -->
                <div class="qr-wrapper">
                    <i class="fa-solid fa-spinner qr-spinner" id="qrSpinner"></i>
                    <img id="qrImage" alt="QRIS Code" />
                </div>

                <!-- Action Buttons -->
                <div class="action-grid">
                    <div class="row">
                        <button class="btn btn-success" id="btnDownload">
                            <i class="fa-solid fa-download"></i> Download QR
                        </button>
                        <button class="btn btn-outline" id="btnCopyLink">
                            <i class="fa-solid fa-link"></i> Salin Link
                        </button>
                    </div>
                    <button class="btn btn-outline" id="btnReset">
                        <i class="fa-solid fa-rotate-left"></i> Generate Lagi
                    </button>
                </div>
            </div>
        </div>

        <!-- ===== HISTORY PANEL ===== -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h3><i class="fa-solid fa-clock-rotate-left"></i> Riwayat</h3>
                <button class="clear-btn" id="clearHistoryBtn" title="Hapus semua riwayat">
                    <i class="fa-regular fa-trash-can"></i> <span class="hide-mobile">Hapus Semua</span>
                </button>
            </div>
            <div class="history-list" id="historyList">
                <!-- Items will be rendered here -->
                <div class="history-empty">
                    <i class="fa-regular fa-receipt"></i>
                    <p>Belum ada transaksi</p>
                </div>
            </div>
        </div>

    </div>

    <!-- ===== FOOTER ===== -->
    <div class="footer">
        Powered by <i class="fa-solid fa-bolt"></i> Jojo Store
        <span class="heart">❤️</span>
    </div>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ============================================ -->
    <!-- ============================================================ -->
    <script>
        /**
         * ==========================================
         * QRIS GENERATOR — MAIN APPLICATION
         * ==========================================
         * API: https://api-mininxd.vercel.app/qris
         * QRIS Data: Jojo Store
         * ==========================================
         */

        (function() {
            'use strict';

            // ---- CONSTANTS ----
            const QRIS_DATA =
                '00020101021126570011ID.DANA.WWW011893600915390930088102099093008810303UMI51440014ID.CO.QRIS.WWW0215ID10254040171760303UMI5204737253033605802ID5910Jojo Store6010Kota Bogor61051634163046B01';
            const API_BASE = 'https://api-mininxd.vercel.app/qris';
            const STORAGE_KEY = 'qris_history';

            // ---- DOM REFS ----
            const $ = (id) => document.getElementById(id);

            const elInput = $('inputNominal');
            const elBtnGen = $('btnGenerate');
            const elViewForm = $('viewForm');
            const elViewResult = $('viewResult');
            const elDisplayNominal = $('displayNominal');
            const elBoxNominal = $('boxNominal');
            const elQrImage = $('qrImage');
            const elQrSpinner = $('qrSpinner');
            const elBtnDownload = $('btnDownload');
            const elBtnCopyLink = $('btnCopyLink');
            const elBtnReset = $('btnReset');
            const elThemeBtn = $('themeBtn');
            const elToastContainer = $('toastContainer');
            const elHistoryList = $('historyList');
            const elClearHistoryBtn = $('clearHistoryBtn');

            // ---- STATE ----
            let rawNominal = 0;
            let currentQRUrl = '';
            let isGenerating = false;
            let history = [];

            // ---- HELPERS ----

            /** Format angka ke Rupiah (ribuan) */
            function formatRupiah(num) {
                return new Intl.NumberFormat('id-ID').format(num);
            }

            /** Bersihkan semua karakter non-digit */
            function sanitizeNumber(str) {
                return str.replace(/\D/g, '');
            }

            /** Tampilkan toast notification */
            function showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
                toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
                elToastContainer.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('fade-out');
                    setTimeout(() => toast.remove(), 350);
                }, 3200);
            }

            /** Switch active view */
            function switchView(hide, show) {
                hide.classList.remove('active');
                setTimeout(() => {
                    show.classList.add('active');
                }, 120);
            }

            /** Copy teks ke clipboard */
            async function copyToClipboard(text, successMsg) {
                try {
                    await navigator.clipboard.writeText(text);
                    showToast(successMsg, 'success');
                } catch (_) {
                    // Fallback
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('Copy');
                    ta.remove();
                    showToast(successMsg, 'success');
                }
            }

            /** Preload gambar */
            function preloadImage(url) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.onload = () => resolve(img);
                    img.onerror = reject;
                    img.src = url;
                });
            }

            // ---- HISTORY MANAGEMENT ----

            function loadHistory() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    history = stored ? JSON.parse(stored) : [];
                } catch (_) {
                    history = [];
                }
                renderHistory();
            }

            function saveHistory() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
            }

            function addHistoryEntry(nominal, qrUrl) {
                const entry = {
                    id: Date.now(),
                    nominal: nominal,
                    formatted: `Rp ${formatRupiah(nominal)}`,
                    qrUrl: qrUrl,
                    timestamp: new Date().toLocaleString('id-ID', {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })
                };
                history.unshift(entry); // tambahkan di awal
                // Batasi 50 item untuk menghindari terlalu banyak
                if (history.length > 50) history = history.slice(0, 50);
                saveHistory();
                renderHistory();
            }

            function deleteHistoryItem(id) {
                history = history.filter(item => item.id !== id);
                saveHistory();
                renderHistory();
            }

            function clearAllHistory() {
                if (history.length === 0) return;
                if (confirm('Hapus semua riwayat transaksi?')) {
                    history = [];
                    saveHistory();
                    renderHistory();
                    showToast('Riwayat dihapus', 'success');
                }
            }

            function renderHistory() {
                if (history.length === 0) {
                    elHistoryList.innerHTML = `
                        <div class="history-empty">
                            <i class="fa-regular fa-receipt"></i>
                            <p>Belum ada transaksi</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                history.forEach(item => {
                    html += `
                        <div class="history-item" data-id="${item.id}">
                            <div class="info">
                                <span class="nominal">${item.formatted}</span>
                                <span class="time">${item.timestamp}</span>
                            </div>
                            <div class="actions">
                                <button class="delete" title="Hapus item" data-id="${item.id}">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
                elHistoryList.innerHTML = html;

                // Event listener untuk tombol delete
                elHistoryList.querySelectorAll('.delete').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = Number(btn.dataset.id);
                        deleteHistoryItem(id);
                        showToast('Item dihapus', 'success');
                    });
                });

                // Klik item untuk menampilkan kembali QR? (opsional)
                elHistoryList.querySelectorAll('.history-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const id = Number(item.dataset.id);
                        const entry = history.find(h => h.id === id);
                        if (entry) {
                            // Tampilkan kembali di result view
                            rawNominal = entry.nominal;
                            currentQRUrl = entry.qrUrl;
                            elDisplayNominal.textContent = entry.formatted;
                            elQrImage.src = currentQRUrl;
                            elQrImage.classList.add('show');
                            elQrSpinner.style.display = 'none';
                            // pindah ke view result
                            if (elViewForm.classList.contains('active')) {
                                switchView(elViewForm, elViewResult);
                            } else {
                                // jika sudah di result, refresh tampilan
                                elQrImage.classList.remove('show');
                                setTimeout(() => {
                                    elQrImage.classList.add('show');
                                }, 50);
                            }
                            showToast('Memuat QR dari riwayat', 'success');
                        }
                    });
                });
            }

            // ---- VALIDATION ----

            function validateInput() {
                const val = sanitizeNumber(elInput.value);
                if (val === '' || val === '0') {
                    showToast('Masukkan nominal terlebih dahulu!', 'error');
                    return false;
                }
                const num = parseInt(val, 10);
                if (num < 10) {
                    showToast('Minimal pembayaran Rp10', 'error');
                    return false;
                }
                if (num > 10000000) {
                    showToast('Nominal maksimal Rp10.000.000', 'error');
                    return false;
                }
                return true;
            }

            // ---- INPUT FORMAT ----

            function handleInputFormat(e) {
                const raw = sanitizeNumber(e.target.value);
                if (raw === '') {
                    rawNominal = 0;
                    e.target.value = '';
                    return;
                }
                rawNominal = parseInt(raw, 10);
                e.target.value = formatRupiah(rawNominal);
            }

            // ---- GENERATE QRIS ----

            async function processGenerate() {
                if (isGenerating) return;
                if (!validateInput()) return;

                isGenerating = true;

                // UI: loading state
                const originalText = elBtnGen.innerHTML;
                elBtnGen.disabled = true;
                elBtnGen.innerHTML = `<span class="spinner"></span> Membuat QRIS...`;
                elInput.disabled = true;

                currentQRUrl = `${API_BASE}?qris=${encodeURIComponent(QRIS_DATA)}&nominal=${rawNominal}&type=images`;

                try {
                    await preloadImage(currentQRUrl);

                    elDisplayNominal.textContent = `Rp ${formatRupiah(rawNominal)}`;
                    elQrImage.src = currentQRUrl;
                    elQrImage.classList.remove('show');
                    elQrSpinner.style.display = 'block';

                    // Tampilkan gambar setelah sedikit delay agar spinner terlihat
                    setTimeout(() => {
                        elQrSpinner.style.display = 'none';
                        elQrImage.classList.add('show');
                    }, 300);

                    // Simpan ke history
                    addHistoryEntry(rawNominal, currentQRUrl);

                    switchView(elViewForm, elViewResult);
                    showToast('QRIS berhasil dibuat!', 'success');

                } catch (_) {
                    showToast('Gagal memuat QR. Silakan coba lagi.', 'error');
                } finally {
                    isGenerating = false;
                    elBtnGen.disabled = false;
                    elBtnGen.innerHTML = originalText;
                    elInput.disabled = false;
                }
            }

            // ---- DOWNLOAD QR ----

            async function downloadQR() {
                if (!currentQRUrl) {
                    showToast('Tidak ada QR untuk diunduh.', 'error');
                    return;
                }
                const original = elBtnDownload.innerHTML;
                elBtnDownload.disabled = true;
                elBtnDownload.innerHTML = `<span class="spinner"></span> Mengunduh...`;

                try {
                    const resp = await fetch(currentQRUrl);
                    const blob = await resp.blob();
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `QRIS_${rawNominal}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('QRIS berhasil diunduh', 'success');
                } catch (_) {
                    // Fallback: buka di tab baru
                    window.open(currentQRUrl, '_blank');
                } finally {
                    elBtnDownload.disabled = false;
                    elBtnDownload.innerHTML = original;
                }
            }

            // ---- RESET ----

            function resetForm() {
                elInput.value = '';
                rawNominal = 0;
                elQrImage.src = '';
                elQrImage.classList.remove('show');
                elQrSpinner.style.display = 'block';
                switchView(elViewResult, elViewForm);
                setTimeout(() => elInput.focus(), 300);
            }

            // ---- THEME ----

            function initTheme() {
                const saved = localStorage.getItem('qris_theme') || 'dark';
                document.documentElement.setAttribute('data-theme', saved);
                updateThemeIcon(saved);
            }

            function toggleTheme() {
                const html = document.documentElement;
                const current = html.getAttribute('data-theme');
                const next = current === 'dark' ? 'light' : 'dark';
                html.setAttribute('data-theme', next);
                localStorage.setItem('qris_theme', next);
                updateThemeIcon(next);
            }

            function updateThemeIcon(theme) {
                const icon = elThemeBtn.querySelector('i');
                if (theme === 'dark') {
                    icon.className = 'fa-solid fa-sun';
                    elThemeBtn.style.color = '#FBBF24';
                } else {
                    icon.className = 'fa-solid fa-moon';
                    elThemeBtn.style.color = '#475569';
                }
            }

            // ---- EVENT BINDING ----

            function init() {
                initTheme();
                loadHistory();

                // Input format
                elInput.addEventListener('input', handleInputFormat);

                // Enter key
                elInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') processGenerate();
                });

                // Generate
                elBtnGen.addEventListener('click', processGenerate);

                // Reset
                elBtnReset.addEventListener('click', resetForm);

                // Copy nominal
                elBoxNominal.addEventListener('click', () => {
                    if (rawNominal > 0) {
                        copyToClipboard(rawNominal.toString(), 'Nominal berhasil disalin!');
                    }
                });

                // Copy link
                elBtnCopyLink.addEventListener('click', () => {
                    if (currentQRUrl) {
                        copyToClipboard(currentQRUrl, 'Link QR berhasil disalin!');
                    } else {
                        showToast('Tidak ada link untuk disalin.', 'error');
                    }
                });

                // Download
                elBtnDownload.addEventListener('click', downloadQR);

                // Theme toggle
                elThemeBtn.addEventListener('click', toggleTheme);

                // Clear history
                elClearHistoryBtn.addEventListener('click', clearAllHistory);

                // Focus input on load
                setTimeout(() => elInput.focus(), 400);
            }

            // ---- START ----
            document.addEventListener('DOMContentLoaded', init);

        })();
    </script>

</body>
</html>
